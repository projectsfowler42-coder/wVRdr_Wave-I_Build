name: Wave-I CI

on:
  push:
    branches:
      - main
      - chatgpt/pre-wave-i-manual-d3-contract
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate-wave-i:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test Wave-I
        run: pnpm run test:wave-i

      - name: Build Wave-I
        run: pnpm --filter @workspace/wave-i run build
