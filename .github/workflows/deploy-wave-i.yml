name: Deploy Wave-I PWA (Block-5)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-audit:
    name: 7-Gate Marshall Build and Audit
    runs-on: ubuntu-latest
    steps:
      - name: Gate 0 - Checkout Repository
        uses: actions/checkout@v4

      - name: Gate 1 - Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Gate 1 - Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Gate 1 - Install Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Gate 2 - Setup Go Marshall Environment
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Gate 2 - Build Marshall CLI
        run: |
          mkdir -p tools/wvrdr-cli/bin
          go build -o tools/wvrdr-cli/bin/wvrdr ./tools/wvrdr-cli

      - name: Gate 3 - Run 7-Gate Truth Spine Audit
        run: ./tools/wvrdr-cli/bin/wvrdr validate

      - name: Gate 4 - Run Wave-I Typecheck
        run: pnpm --filter @workspace/wave-i run typecheck

      - name: Gate 5 - Run Wave-I Unit Tests
        run: pnpm --filter @workspace/wave-i run test

      - name: Gate 6 - Build Wave-I PWA Artifact
        run: pnpm --filter @workspace/wave-i run build

      - name: Gate 7 - Verify GitHub Pages Artifact Path
        run: |
          test -d artifacts/wave-i/dist
          test -f artifacts/wave-i/dist/index.html

      - name: Upload Build Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/wave-i/dist

  deploy:
    name: Deploy Wave-I GitHub Pages Mirror
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-and-audit
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
