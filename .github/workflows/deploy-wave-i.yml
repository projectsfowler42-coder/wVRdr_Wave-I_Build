name: Deploy Wave-I

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy-wave-i-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-static-rescue:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate static rescue payload
        run: |
          test -f artifacts/wave-i/dist/public/index.html
          test -f artifacts/wave-i/dist/public/404.html
          test -f artifacts/wave-i/dist/public/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/wave-i/dist/public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
