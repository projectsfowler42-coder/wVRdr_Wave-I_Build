name: Deploy Wave-I

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy-wave-i-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install
        run: pnpm install --no-frozen-lockfile

      - name: Typecheck workspace
        run: pnpm run typecheck

      - name: Test Wave-I
        run: pnpm run test:wave-i

      - name: Build Wave-I static app and Ghost Image
        env:
          BASE_PATH: /${{ github.event.repository.name }}/
        run: pnpm --filter @workspace/wave-i run build:ghost

      - name: Validate release bundle
        run: pnpm run release:validate

      - name: Prepare Pages assets
        run: node scripts/prepare-pages.mjs

      - name: Validate built app exists
        run: test -f artifacts/wave-i/dist/public/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/wave-i/dist/public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Smoke check deployed site
        env:
          PAGES_URL: ${{ steps.deployment.outputs.page_url }}
        run: node scripts/smoke-check-pages.mjs
