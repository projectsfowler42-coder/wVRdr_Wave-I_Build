name: Wave-I backend smoke

on:
  pull_request:
    paths:
      - "src/server.ts"
      - "scripts/smoke-wave-i-backend.mjs"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/wave-i-backend-smoke.yml"
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable pnpm
        run: corepack enable

      - name: Prepare pnpm
        run: corepack prepare pnpm@9.15.9 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Run Wave-I backend smoke test
        run: pnpm smoke:wave-i-backend
