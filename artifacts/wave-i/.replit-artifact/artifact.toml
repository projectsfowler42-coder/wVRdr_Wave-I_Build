kind = "web"
previewPath = "/"
title = "Wave-I War Room"
version = "1.0.0"
id = "artifacts/wave-i"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24667

[services.development]
run = "pnpm --filter @workspace/wave-i run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/wave-i", "run", "build" ]
publicDir = "artifacts/wave-i/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24667"
BASE_PATH = "/"
